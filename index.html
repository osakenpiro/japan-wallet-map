var TOKYO_CODES=["13","14","11","12"];
var allYears=YEARS.concat(FYEARS);

function getPop(pref,year){
  var yi=YEARS.indexOf(year);
  if(yi>=0)return pref.p[yi];
  var fi=FYEARS.indexOf(year);
  if(fi>=0)return pref.fp[fi];
  // interpolate
  for(var i=0;i<allYears.length-1;i++){
    if(year>=allYears[i]&&year<allYears[i+1]){
      var t=(year-allYears[i])/(allYears[i+1]-allYears[i]);
      var p1=i<YEARS.length?pref.p[i]:pref.fp[i-YEARS.length];
      var p2=(i+1)<YEARS.length?pref.p[i+1]:pref.fp[(i+1)-YEARS.length];
      return Math.round(p1+(p2-p1)*t);
    }
  }
  return pref.fp[pref.fp.length-1];
}

function bubbleR(pop){return Math.sqrt(pop)*0.25;}

var cY=2020,pl=false,tm=null;

function showTT(html,ex,ey){
  tt.innerHTML=html;tt.style.display='block';
  var tw=tt.offsetWidth,th=tt.offsetHeight,vw=window.innerWidth,vh=window.innerHeight;
  var lx=ex+14,ly=ey-24;
  if(lx+tw>vw-10)lx=ex-tw-14;if(ly<10)ly=ey+14;if(ly+th>vh-10)ly=vh-th-10;
  tt.style.left=lx+'px';tt.style.top=ly+'px';
}

d3.json('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json').then(function(w){
  var ft=topojson.feature(w,w.objects.countries).features;
  var jp=ft.find(function(f){return f.id==='392';});
  if(jp)gM.append('path').datum(jp).attr('d',pa).attr('fill',dk?'#2C2C2A':'#F1EFE8').attr('stroke',dk?'#5F5E5A':'#B4B2A9').attr('stroke-width',0.5);
  ft.filter(function(f){return ['410','156','643','408','158'].indexOf(f.id)>=0;}).forEach(function(f){
    gM.append('path').datum(f).attr('d',pa).attr('fill',dk?'#1e1e1c':'#e8e6df').attr('stroke',dk?'#444':'#ccc').attr('stroke-width',0.3);
  });
  upd();
});

function upd(){
  var y=cY;
  var isFuture=y>2020;
  gB.selectAll('*').remove();
  gL.selectAll('*').remove();

  var data=P.map(function(pref){
    var pop=getPop(pref,y);
    var prevPop=y>1920?getPop(pref,Math.max(1920,y-10)):pop;
    var growth=pop-prevPop;
    return {pref:pref,pop:pop,growth:growth};
  }).sort(function(a,b){return a.pop-b.pop;});

  var totalPop=data.reduce(function(s,d){return s+d.pop;},0);
  var tokyoPop=data.filter(function(d){return TOKYO_CODES.indexOf(d.pref.c)>=0;}).reduce(function(s,d){return s+d.pop;},0);
  var maxPref=data[data.length-1];

  document.getElementById('sPop').textContent=(totalPop/1000).toFixed(1)+'万人';
  document.getElementById('sTokyo').textContent=Math.round(tokyoPop/totalPop*100)+'%';
  document.getElementById('sMax').textContent=maxPref.pref.n+' '+(maxPref.pop/1000).toFixed(0)+'万';

  data.forEach(function(d){
    var xy=pj([d.pref.lo,d.pref.la]);
    var cx=xy[0],cy=xy[1];
    var r=bubbleR(d.pop);
    var isGrowing=d.growth>0;
    var intensity=Math.min(1,Math.abs(d.growth)/500);

    var fillColor,strokeColor;
    if(isGrowing){
      fillColor='rgba(216,90,48,'+(0.15+intensity*0.45)+')';
      strokeColor='#D85A30';
    }else{
      fillColor='rgba(55,138,221,'+(0.15+intensity*0.35)+')';
      strokeColor='#378ADD';
    }
    if(isFuture){
      fillColor=fillColor.replace(/[\d.]+\)$/,(parseFloat(fillColor.match(/[\d.]+\)$/)[0])*0.6).toFixed(2)+')');
    }

    var g=gB.append('g');
    g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r)
      .attr('fill',fillColor).attr('stroke',strokeColor)
      .attr('stroke-width',isFuture?1:1.5).attr('stroke-opacity',isFuture?0.4:0.7)
      .attr('stroke-dasharray',isFuture?'3,2':'none');

    if(d.pop>2000||r>15){
      gL.append('text').attr('x',cx).attr('y',cy+3)
        .attr('text-anchor','middle').attr('font-size',r>25?'11px':'9px')
        .attr('font-weight','500').attr('fill',dk?'#eee':'#1a1a1a')
        .attr('font-family','-apple-system,sans-serif')
        .attr('pointer-events','none')
        .text(d.pref.n);
    }

    g.append('circle').attr('cx',cx).attr('cy',cy).attr('r',Math.max(r,12))
      .attr('fill','none').attr('stroke','none').style('pointer-events','all').style('cursor','pointer')
      .on('mouseenter',function(ev){
        if(isMobile)return;
        var chg=d.growth>0?'+':'';
        showTT(
          '<div style="font-weight:500;font-size:15px;">'+d.pref.n+'</div>'+
          '<div style="font-size:14px;font-weight:500;margin:4px 0;">'+d.pop.toLocaleString()+'\u5343\u4EBA</div>'+
          '<div style="color:'+(d.growth>0?'#D85A30':'#378ADD')+'">10\u5E74\u5909\u5316: '+chg+d.growth.toLocaleString()+'\u5343</div>'+
          (isFuture?'<div style="font-size:11px;color:var(--tx3);margin-top:4px;">\u2192 \u5C06\u6765\u63A8\u8A08\u5024</div>':''),
          ev.clientX,ev.clientY
        );
      })
      .on('mousemove',function(ev){if(!isMobile)showTT(tt.innerHTML,ev.clientX,ev.clientY);})
      .on('mouseleave',function(){tt.style.display='none';})
      .on('touchstart',function(ev){
        ev.preventDefault();var t=ev.touches[0];
        var chg=d.growth>0?'+':'';
        showTT(
          '<div style="font-weight:500;">'+d.pref.n+': '+d.pop.toLocaleString()+'\u5343\u4EBA ('+chg+d.growth+'\u5343)</div>',
          t.clientX,t.clientY
        );
        setTimeout(function(){tt.style.display='none';},2500);
      });
  });
}

var sl=document.getElementById('ys');
var yv=document.getElementById('yv');
sl.addEventListener('input',function(){
  cY=+this.value;
  var snapped=Math.round(cY/5)*5;
  cY=snapped;this.value=snapped;
  yv.textContent=cY;upd();
});
document.getElementById('pb').addEventListener('click',function(){
  if(pl){pl=false;this.textContent='\u518D\u751F';clearInterval(tm);return;}
  pl=true;this.textContent='\u505C\u6B62';
  sl.value=1920;cY=1920;yv.textContent='1920';upd();
  tm=setInterval(function(){
    cY+=5;
    if(cY>2050){cY=2050;pl=false;document.getElementById('pb').textContent='\u518D\u751F';clearInterval(tm);}
    sl.value=cY;yv.textContent=cY;upd();
  },400);
});
document.addEventListener('click',function(ev){if(!tt.contains(ev.target))tt.style.display='none';});
})();
