function getHistPop(y){
  for(var i=0;i<HIST_POP.length-1;i++){
    if(y>=HIST_POP[i].y&&y<HIST_POP[i+1].y){
      var t=(y-HIST_POP[i].y)/(HIST_POP[i+1].y-HIST_POP[i].y);
      return Math.round(HIST_POP[i].pop+(HIST_POP[i+1].pop-HIST_POP[i].pop)*t);
    }
  }
  if(y<=HIST_POP[0].y)return HIST_POP[0].pop;
  return HIST_POP[HIST_POP.length-1].pop;
}
function getModPop(pref,y){
  var yi=YEARS.indexOf(y);if(yi>=0)return pref.p[yi];
  var fi=FYEARS.indexOf(y);if(fi>=0)return pref.fp[fi];
  var all=YEARS.concat(FYEARS);
  for(var i=0;i<all.length-1;i++){
    if(y>=all[i]&&y<all[i+1]){
      var t=(y-all[i])/(all[i+1]-all[i]);
      var p1=i<YEARS.length?pref.p[i]:pref.fp[i-YEARS.length];
      var p2=(i+1)<YEARS.length?pref.p[i+1]:pref.fp[(i+1)-YEARS.length];
      return Math.round(p1+(p2-p1)*t);
    }
  }
  return pref.fp[pref.fp.length-1];
}
function getEra(y){for(var i=ERAS.length-1;i>=0;i--){if(y>=ERAS[i].start)return ERAS[i];}return ERAS[0];}

}

  if(v<=400)return Math.round(600+(v/400)*1320);

function yearToSlider(y){
  if(y<=1920)return Math.round((y-600)/1320*400);
  return Math.round(400+(y-1920)/130*600);
}

  if(y<1920){return Math.round(y/25)*25;}

  var ft=topojson.feature(w,w.objects.countries).features;
  var jp=ft.find(function(f){return f.id==='392';});
  if(jp)gM.append('path').datum(jp).attr('d',pa).attr('fill',dk?'#2C2C2A':'#F1EFE8').attr('stroke',dk?'#5F5E5A':'#B4B2A9').attr('stroke-width',0.5);
  ft.filter(function(f){return ['410','156','643','408','158'].indexOf(f.id)>=0;}).forEach(function(f){
    gM.append('path').datum(f).attr('d',pa).attr('fill',dk?'#1e1e1c':'#e8e6df').attr('stroke',dk?'#444':'#ccc').attr('stroke-width',0.3);
  });
  upd();
});

function upd(){
  var y=cY;
  gB.selectAll('*').remove();gL.selectAll('*').remove();gFlow.selectAll('*').remove();gHist.selectAll('*').remove();
  var era=getEra(y);
  document.getElementById('era').textContent=era.name;

  if(y<1920){
    var hp=getHistPop(y);
    updateBeaker(hp,Math.round(hp*0.08),era);
    document.getElementById('sPop').textContent=Math.round(hp/10)+'\u4E07\u4EBA';
    document.getElementById('sTokyo').textContent='\u2014';
    document.getElementById('sCenter').textContent=era.center;
    var cxy=pj([era.lon,era.lat]);
    gHist.append('circle').attr('cx',cxy[0]).attr('cy',cxy[1]).attr('r',18)
      .attr('fill','rgba(216,90,48,0.15)').attr('stroke','#D85A30').attr('stroke-width',2.5);
    gHist.append('text').attr('x',cxy[0]).attr('y',cxy[1]-24).attr('text-anchor','middle')
      .attr('font-size','14px').attr('font-weight','500').attr('fill',dk?'#eee':'#1a1a1a')
      .attr('font-family','-apple-system,sans-serif').text(era.center);
    gHist.append('text').attr('x',cxy[0]).attr('y',cxy[1]+5).attr('text-anchor','middle')
      .attr('font-size','10px').attr('fill',dk?'#bbb':'#666')
      .attr('font-family','-apple-system,sans-serif').text(era.name);
    ERAS.forEach(function(e){
      if(e===era)return;
      var exy=pj([e.lon,e.lat]);
      if(Math.abs(exy[0]-cxy[0])<10&&Math.abs(exy[1]-cxy[1])<10)return;
      gHist.append('circle').attr('cx',exy[0]).attr('cy',exy[1]).attr('r',5)
        .attr('fill','none').attr('stroke',dk?'#555':'#ccc').attr('stroke-width',1);
      gHist.append('text').attr('x',exy[0]).attr('y',exy[1]-10).attr('text-anchor','middle')
        .attr('font-size','8px').attr('fill',dk?'#666':'#aaa')
        .attr('font-family','-apple-system,sans-serif').text(e.center);
    });
    return;
  }

  var isFuture=y>2020;
  var data=P.map(function(pref){
    var pop=getModPop(pref,y);
    var prevPop=y>1920?getModPop(pref,Math.max(1920,y-10)):pop;
    return {pref:pref,pop:pop,growth:pop-prevPop};
  }).sort(function(a,b){return a.pop-b.pop;});

  var totalPop=data.reduce(function(s,d){return s+d.pop;},0);
  var tokyoPop=data.filter(function(d){return TOKYO_CODES.indexOf(d.pref.c)>=0;}).reduce(function(s,d){return s+d.pop;},0);
  updateBeaker(totalPop,tokyoPop,era);
  document.getElementById('sPop').textContent=Math.round(totalPop/10)+'\u4E07\u4EBA';
  document.getElementById('sTokyo').textContent=Math.round(tokyoPop/totalPop*100)+'%';
  document.getElementById('sCenter').textContent=era.center;

  var growing=data.filter(function(d){return d.growth>50;}).sort(function(a,b){return b.growth-a.growth;}).slice(0,5);
  var shrinking=data.filter(function(d){return d.growth<-30;}).sort(function(a,b){return a.growth-b.growth;}).slice(0,5);
  if(growing.length>0&&shrinking.length>0){
    var topT=growing[0];var txy=pj([topT.pref.lo,topT.pref.la]);
    shrinking.forEach(function(src){
      var sxy=pj([src.pref.lo,src.pref.la]);
      var mx=(sxy[0]+txy[0])/2,my=(sxy[1]+txy[1])/2;
      var dx=txy[0]-sxy[0],dy=txy[1]-sxy[1];
      var pathStr='M'+sxy[0]+','+sxy[1]+' Q'+(mx-dy*0.2)+','+(my+dx*0.2)+' '+txy[0]+','+txy[1];
      var intensity=Math.min(1,Math.abs(src.growth)/200);
      gFlow.append('path').attr('d',pathStr).attr('fill','none')
        .attr('stroke',dk?'rgba(55,138,221,0.18)':'rgba(55,138,221,0.12)')
        .attr('stroke-width',1+intensity*2);
      for(var di=0;di<3;di++){
        var dot=gFlow.append('circle').attr('r',1.5+intensity).attr('fill','#378ADD').attr('fill-opacity',0.6);
        var p=gFlow.append('path').attr('d',pathStr).attr('fill','none').attr('stroke','none');
        var pN=p.node(),tL=pN.getTotalLength(),off=di/3;
        (function(d,pn,tl,o){
          function anim(){d.transition().duration(3000).ease(d3.easeLinear).attrTween('transform',function(){
            return function(t){var pt=pn.getPointAtLength(((t+o)%1)*tl);return 'translate('+pt.x+','+pt.y+')';};
          }).on('end',anim);}anim();
        })(dot,pN,tL,off);
      }
    });
  }

  data.forEach(function(d){
    var xy=pj([d.pref.lo,d.pref.la]),cx=xy[0],cy=xy[1],r=bubbleR(d.pop);
    var isG=d.growth>0,int=Math.min(1,Math.abs(d.growth)/500);
    var fc=isG?'rgba(216,90,48,'+(0.15+int*0.45)+')':'rgba(55,138,221,'+(0.15+int*0.35)+')';
    var sc=isG?'#D85A30':'#378ADD';
    if(isFuture)fc=fc.replace(/[\d.]+\)$/,(parseFloat(fc.match(/[\d.]+\)$/)[0])*0.6).toFixed(2)+')');
    gB.append('circle').attr('cx',cx).attr('cy',cy).attr('r',r).attr('fill',fc)
      .attr('stroke',sc).attr('stroke-width',isFuture?1:1.5).attr('stroke-opacity',isFuture?0.4:0.7)
      .attr('stroke-dasharray',isFuture?'3,2':'none');
    if(d.pop>2000||r>15){
      gL.append('text').attr('x',cx).attr('y',cy+3).attr('text-anchor','middle')
        .attr('font-size',r>25?'11px':'9px').attr('font-weight','500')
        .attr('fill',dk?'#eee':'#1a1a1a').attr('font-family','-apple-system,sans-serif')
        .attr('pointer-events','none').text(d.pref.n);
    }
    gB.append('circle').attr('cx',cx).attr('cy',cy).attr('r',Math.max(r,12))
      .attr('fill','none').attr('stroke','none').style('pointer-events','all').style('cursor','pointer')
      .on('mouseenter',function(ev){if(!isMobile){
        var ch=d.growth>0?'+':'';
        showTT('<b>'+d.pref.n+'</b><br>'+d.pop.toLocaleString()+'\u5343\u4EBA\uFF08'+(d.pop/10).toFixed(0)+'\u4E07\uFF09<br><span style="color:'+(d.growth>0?'#D85A30':'#378ADD')+'">10\u5E74\u5909\u5316: '+ch+d.growth.toLocaleString()+'\u5343</span>'+(isFuture?'<br><span style="color:var(--tx3)">\u2192 \u5C06\u6765\u63A8\u8A08</span>':''),ev.clientX,ev.clientY);
      }})
      .on('mousemove',function(ev){if(!isMobile)showTT(tt.innerHTML,ev.clientX,ev.clientY);})
      .on('mouseleave',function(){tt.style.display='none';})
      .on('touchstart',function(ev){ev.preventDefault();var t=ev.touches[0];showTT('<b>'+d.pref.n+'</b>: '+(d.pop/10).toFixed(0)+'\u4E07',t.clientX,t.clientY);setTimeout(function(){tt.style.display='none';},2000);});
  });
}

var sl=document.getElementById('ys'),yv=document.getElementById('yv');
sl.addEventListener('input',function(){
  var raw=sliderToYear(+this.value);
  cY=snapYear(raw);
  yv.textContent=cY;upd();
});
document.getElementById('pb').addEventListener('click',function(){
  if(pl){pl=false;this.textContent='\u518D\u751F';clearInterval(tm);return;}
  pl=true;this.textContent='\u505C\u6B62';
  cY=600;sl.value=0;yv.textContent='600';upd();
  var sv=0;
  tm=setInterval(function(){
    sv+=sv<400?8:3;
    if(sv>1000){sv=1000;pl=false;document.getElementById('pb').textContent='\u518D\u751F';clearInterval(tm);}
    cY=snapYear(sliderToYear(sv));
    sl.value=sv;yv.textContent=cY;upd();
  },150);
});
document.addEventListener('click',function(ev){if(!tt.contains(ev.target))tt.style.display='none';});

(function drawEraBar(){
  var bar=document.getElementById('eraBar');
  var marks=[
    {y:710,label:'奈良'},{y:794,label:'平安'},{y:1185,label:'鎌倉'},
    {y:1573,label:'戦国'},{y:1603,label:'江戸'},{y:1868,label:'明治'},
    {y:1920,label:'|近代▶'},{y:1945,label:'戦後'},{y:2000,label:'2000'}
  ];
  marks.forEach(function(m){
    var pct=yearToSlider(m.y)/10;
    var el=document.createElement('span');
    el.style.cssText='position:absolute;left:'+pct+'%;transform:translateX(-50%);white-space:nowrap;';
    if(m.y===1920)el.style.fontWeight='600';
    el.textContent=m.label;
    bar.appendChild(el);
  });
})();
})();
</script>
